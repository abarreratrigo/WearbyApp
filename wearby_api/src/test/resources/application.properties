# Base de datos H2 en memoria para tests
spring.datasource.url=jdbc:h2:mem:wearby_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — create-drop crea las tablas primero
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Forzar que el data.sql se ejecute DESPUÉS de que Hibernate cree las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Desactivar multipart para tests
spring.servlet.multipart.enabled=false